<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KFZ-Abmeldung starten – Online Antrag stellen | 29,95 €</title>
<meta name="description" content="Starten Sie Ihre Online-Fahrzeugabmeldung in nur 7 einfachen Schritten. Sicher, schnell und bundesweit gültig." />
<link rel="canonical" href="./abmeldung.html" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
<link rel="stylesheet" href="assets/styles.css" />
<style>
  .auth-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.625rem 1.25rem;font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted-foreground);font-family:ui-monospace,monospace;text-align:center}
  .form-wrap{max-width:48rem;margin:0 auto;padding:2rem 1.25rem 5rem}
  .stepper{display:flex;justify-content:space-between;gap:.5rem;margin-bottom:2rem}
  .stepper .dot{flex:1;height:6px;border-radius:9999px;background:var(--border)}
  .stepper .dot.done,.stepper .dot.cur{background:var(--primary)}
  .progress-card{border:1px solid var(--border);background:#fff;padding:1.5rem;box-shadow:var(--shadow-soft);border-radius:8px}
  .step-card{border:1px solid var(--border);background:#fff;box-shadow:var(--shadow-card);border-radius:8px;margin-top:1.5rem;overflow:hidden}
  .step-card .head{display:flex;align-items:center;gap:.75rem;padding:1rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border)}
  .step-card .head .ic{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:#fff;color:var(--primary);border-radius:4px}
  .step-card .head .ttl{font-weight:600}
  .step-card .body{padding:1.5rem}
  .nav-row{display:flex;justify-content:space-between;gap:.75rem;margin-top:1.5rem}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--foreground);padding:.625rem 1rem;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
  .summary{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1rem;font-size:14px}
  .summary div{display:flex;justify-content:space-between;padding:.375rem 0;border-bottom:1px solid var(--border)}
  .summary div:last-child{border:0}
  .summary .k{color:var(--muted-foreground)}
  .summary .v{font-weight:600;font-family:ui-monospace,monospace}
  .success-screen{text-align:center;padding:3rem 1.25rem}
  .success-screen .check{width:56px;height:56px;margin:0 auto;display:flex;align-items:center;justify-content:center;border-radius:4px;background:var(--success-soft);color:var(--success)}
</style>
</head>
<body>
<div class="app">
  <div id="site-header"></div>
  <main style="background:var(--surface)">
    <div class="auth-bar">Online-Verfahren · Außerbetriebsetzung · § 14 FZV</div>
    <div class="form-wrap" id="wrap">
      <div class="eyebrow">KFZ-Abmeldung</div>
      <h1 style="margin-top:.5rem;font-size:28px;font-weight:700;letter-spacing:-.02em">Antrag in 7 Schritten</h1>
      <p class="muted mt-2" id="progressText">Schritt 1 von 7 — 14% abgeschlossen</p>

      <div class="stepper" id="stepper"></div>

      <div class="progress-card">
        <form id="form" novalidate>
          <div class="step-card" id="stepCard">
            <div class="head">
              <div class="ic"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="15" r="4"/><path d="m10.85 12.15 7.4-7.4M18 5l4 4-4 4-4-4"/></svg></div>
              <div><div class="ttl" id="stepTitle">Kennzeichen</div><div class="muted" style="font-size:12px" id="stepDesc">Bitte erfassen Sie Ihr amtliches Kennzeichen.</div></div>
            </div>
            <div class="body" id="stepBody"></div>
          </div>
          <div class="nav-row">
            <button type="button" class="btn-ghost" id="prevBtn">‹ Zurück</button>
            <button type="button" class="btn btn-primary" id="nextBtn">Weiter ›</button>
          </div>
        </form>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>
</div>
<script src="assets/partials.js"></script>
<script>
const STEPS = [
  { key:"plate", title:"Kennzeichen", desc:"Bitte erfassen Sie Ihr amtliches Kennzeichen.", fields:[{id:"plate",label:"Kennzeichen",placeholder:"z.B. B-AB 1234"}]},
  { key:"vin", title:"Fahrzeugidentifikationsnummer (FIN)", desc:"17-stellige FIN aus der Zulassungsbescheinigung Teil I.", fields:[{id:"vin",label:"FIN",placeholder:"17 Zeichen"}]},
  { key:"regCode", title:"Sicherheitscode ZB I", desc:"Verdeckter Code aus der Zulassungsbescheinigung – freirubbeln.", fields:[{id:"regCode",label:"Sicherheitscode ZB I"}]},
  { key:"plateCode1", title:"Sicherheitscode Kennzeichen 1", desc:"Code der vorderen Stempelplakette.", fields:[{id:"plateCode1",label:"Code KZ 1"}]},
  { key:"plateCode2", title:"Sicherheitscode Kennzeichen 2", desc:"Code der hinteren Stempelplakette.", fields:[{id:"plateCode2",label:"Code KZ 2"}]},
  { key:"contact", title:"Antragstellerdaten", desc:"Damit wir Sie erreichen können.", fields:[
      {id:"firstName",label:"Vorname"},{id:"lastName",label:"Nachname"},
      {id:"email",label:"E-Mail",type:"email"},{id:"phone",label:"Telefon",type:"tel"},
      {id:"address",label:"Anschrift"},
    ]},
  { key:"summary", title:"Prüfung & verbindliche Beauftragung", desc:"Bitte überprüfen Sie Ihre Angaben.", summary:true },
];
const state = {};
let i = 0;

function renderStepper(){
  document.getElementById("stepper").innerHTML = STEPS.map((_,k)=>`<div class="dot ${k<i?'done':k===i?'cur':''}"></div>`).join("");
  const pct = Math.round(((i+1)/STEPS.length)*100);
  document.getElementById("progressText").textContent = `Schritt ${i+1} von ${STEPS.length} — ${pct}% abgeschlossen`;
}
function renderStep(){
  const s = STEPS[i];
  document.getElementById("stepTitle").textContent = s.title;
  document.getElementById("stepDesc").textContent = s.desc;
  const body = document.getElementById("stepBody");
  if (s.summary) {
    body.innerHTML = `
      <p class="muted mt-2" style="margin-top:0">Mit dem Absenden beauftragen Sie uns kostenpflichtig (29,95 €) mit der Abmeldung.</p>
      <div class="summary mt-4">
        <div><span class="k">Kennzeichen</span><span class="v">${state.plate||"—"}</span></div>
        <div><span class="k">FIN</span><span class="v">${state.vin||"—"}</span></div>
        <div><span class="k">Code ZB I</span><span class="v">${state.regCode||"—"}</span></div>
        <div><span class="k">Code KZ 1</span><span class="v">${state.plateCode1||"—"}</span></div>
        <div><span class="k">Code KZ 2</span><span class="v">${state.plateCode2||"—"}</span></div>
        <div><span class="k">Name</span><span class="v">${(state.firstName||"")+" "+(state.lastName||"")}</span></div>
        <div><span class="k">E-Mail</span><span class="v">${state.email||"—"}</span></div>
      </div>
      <label style="display:flex;align-items:flex-start;gap:.5rem;font-size:14px;color:var(--muted-foreground);margin-top:1rem">
        <input type="checkbox" id="finalConsent" style="margin-top:3px" required />
        <span>Ich beauftrage die kostenpflichtige Abmeldung verbindlich und habe die <a href="datenschutz.html" style="color:var(--primary);text-decoration:underline">Datenschutzerklärung</a> gelesen.</span>
      </label>`;
    document.getElementById("nextBtn").textContent = "Verbindlich absenden";
  } else {
    body.innerHTML = s.fields.map(f=>`
      <div class="field">
        <label for="${f.id}">${f.label}</label>
        <input id="${f.id}" type="${f.type||'text'}" value="${state[f.id]||""}" placeholder="${f.placeholder||""}" required />
      </div>`).join("");
    document.getElementById("nextBtn").textContent = "Weiter ›";
  }
  document.getElementById("prevBtn").disabled = i===0;
  renderStepper();
  window.scrollTo({top:0,behavior:"smooth"});
}
function saveCurrent(){
  const s = STEPS[i];
  if (s.summary) return document.getElementById("finalConsent")?.checked;
  let ok = true;
  s.fields.forEach(f=>{
    const el = document.getElementById(f.id);
    if (!el.value.trim()) { el.style.borderColor="var(--destructive)"; ok=false; }
    else { el.style.borderColor=""; state[f.id]=el.value.trim(); }
  });
  return ok;
}
document.getElementById("prevBtn").addEventListener("click",()=>{ if(i>0){i--;renderStep();}});
document.getElementById("nextBtn").addEventListener("click",()=>{
  if (!saveCurrent()) return;
  if (i < STEPS.length - 1) { i++; renderStep(); }
  else {
    const ticket = "KFZ-" + Math.floor(Math.random()*900000+100000);
    document.getElementById("wrap").innerHTML = `
      <div class="success-screen">
        <div class="check"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg></div>
        <div class="eyebrow mt-4">Vorgang abgeschlossen</div>
        <h1 style="margin-top:.5rem;font-size:26px;font-weight:700">Antrag erfolgreich übermittelt</h1>
        <p class="muted mt-4">Vielen Dank, ${state.firstName||""}. Wir haben Ihre Anfrage erhalten und melden uns in Kürze unter <strong style="color:var(--foreground)">${state.email||"Ihrer E-Mail"}</strong>.</p>
        <div class="summary" style="text-align:left;max-width:24rem;margin:2rem auto 0">
          <div><span class="k">Antragsnummer</span><span class="v">${ticket}</span></div>
          <div><span class="k">Kennzeichen</span><span class="v">${(state.plate||"").toUpperCase()}</span></div>
          <div><span class="k">Pauschalpreis</span><span class="v">29,95 €</span></div>
        </div>
        <a href="index.html" class="btn btn-primary mt-8">Zur Startseite</a>
      </div>`;
  }
});
renderStep();
</script>
</body>
</html>
